<form [formGroup]="editProfileForm" (submit)="onSubmit($event)">
    <h2>Informationen bearbeiten</h2>
    <app-edit-account-input [type]="'email'" [label]="'E-Mail'" [placeholder]="user().email" [autocomplete]="'email'" [iconSource]="'/svg/mail.svg'" [iconAlt]="'Ein Brief'" (valueOutput)="updateEmailInput($event)"></app-edit-account-input>
    <app-edit-account-input
        [type]="'password'"
        [label]="'Passwort'"
        [placeholder]="'••••••••••'"
        [autocomplete]="'current-password'"
        [isPassword]="true"
        [iconSource]="'/svg/lock.svg'"
        [iconAlt]="'Ein Schloss'"
        (valueOutput)="updatePasswordInput($event)"
    ></app-edit-account-input>
    <app-edit-account-input
        [type]="'text'"
        [label]="'Vorname'"
        [placeholder]="user().firstName"
        [autocomplete]="'given-name'"
        [iconSource]="'/svg/text.svg'"
        [iconAlt]="'Buchstaben'"
        (valueOutput)="updateFirstNameInput($event)"
    ></app-edit-account-input>
    <app-edit-account-input
        [type]="'text'"
        [label]="'Nachname'"
        [placeholder]="user().lastName"
        [autocomplete]="'family-name'"
        [iconSource]="'/svg/text.svg'"
        [iconAlt]="'Buchstaben'"
        (valueOutput)="updateLastNameInput($event)"
    ></app-edit-account-input>
    <app-edit-account-input
        [type]="'text'"
        [label]="'Adresse'"
        [placeholder]="user().address.split(',')[0]"
        [autocomplete]="'street-address'"
        [iconSource]="'/svg/location.svg'"
        [iconAlt]="'Ein Standort-Pin'"
        (valueOutput)="updateAddressInput($event)"
    ></app-edit-account-input>
    <div>
        <app-edit-account-input
            [type]="'text'"
            [label]="'Postleitzahl'"
            [placeholder]="user().address.split(', ')[1].split(' ')[0]"
            [autocomplete]="'postal-code'"
            [required]="true"
            [iconSource]="'/svg/location.svg'"
            [iconAlt]="'Ein Standort-Pin'"
            (valueOutput)="updatePostalCodeInput($event)"
        ></app-edit-account-input>
        <app-edit-account-input
            [type]="'text'"
            [label]="'Ort'"
            [placeholder]="user().address.split(', ')[1].split(' ').slice(1).join(' ')"
            [autocomplete]="'address-level2'"
            [required]="true"
            [iconSource]="'/svg/location.svg'"
            [iconAlt]="'Ein Standort-Pin'"
            (valueOutput)="updateCityInput($event)"
        ></app-edit-account-input>
    </div>

    <app-edit-account-input [type]="'tel'" [label]="'Telefon Nummer'" [placeholder]="user().phone" [autocomplete]="'tel'" [iconSource]="'/svg/phone.svg'" [iconAlt]="'Ein Telefon'" (valueOutput)="updatePhoneInput($event)"></app-edit-account-input>

    <button type="submit" [disabled]="submitButtonDisabled()">{{ submitButtonText() }}</button>
</form>
