<div class="popup">
    <form class="wrapper" (submit)="onSubmit($event)">
        <h2>{{ title() }}</h2>
        <p>{{ description() }}</p>
        <label for="image" class="text-label">{{ label() }}</label>
        <input type="file" accept="image/*" id="image" required (change)="onChange($event)"/>
        <label for="image" class="image-label">
            <img [src]="image().url" alt="Vorschau des Bildes" />
        </label>
        <button type="submit" class="submit" [disabled]="submitButtonDisabled()">{{ submitButtonText() }}</button>
        <button type="button" class="close" (click)="close()">
            <img src="/svg/close.svg" alt="Popup schließen" />
        </button>
    </form>
</div>
