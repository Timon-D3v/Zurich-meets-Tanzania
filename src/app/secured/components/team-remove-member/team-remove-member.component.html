<form [formGroup]="removeTeamMemberForm" (submit)="onSubmit($event)">
    <h2>Teammitglied entfernen</h2>

    <p>
        Gib eine E-Mail-Adresse ein Mitglied aus dem Team zu entfernen.
    </p>

    <label for="email">E-Mail</label>
    <input type="email" id="email" placeholder="E-Mail-Adresse eingeben" required formControlName="emailControl" />
    
    <button type="submit" [disabled]="submitButtonDisabled()">{{ submitButtonText() }}</button>
</form>
